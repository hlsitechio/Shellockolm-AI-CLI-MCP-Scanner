name = "shellockolm-license"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Authoritative license-validation API for Shellockolm Pro (open-core paywall).
# The OSS repo stays free/downloadable; this server gates Pro keys + premium content.

[[kv_namespaces]]
binding = "LICENSES"
id = "REPLACE_WITH_KV_ID"   # wrangler kv namespace create LICENSES

# Secrets (set with `wrangler secret put <NAME>` — never commit these):
#   LICENSE_SECRET        match src/licensing.py _OFFLINE_SECRET for offline-key compatibility
#   STRIPE_SECRET         to verify active subscriptions (optional, for richer checks)
#   STRIPE_WEBHOOK_SECRET to verify /stripe/webhook signatures and auto-issue keys
