name: CI - Tests and Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Upgrade pip tooling
      run: python -m pip install --upgrade pip setuptools wheel

    - name: Install package and dev dependencies
      run: pip install .[dev]

    - name: Verify console script works
      shell: bash
      run: |
        shellockolm version
        shellockolm --help

    - name: Verify flat imports resolve from the installed package
      shell: bash
      run: |
        # Run from a neutral directory so src/ is NOT implicitly on sys.path;
        # this proves the installed distribution exposes the flat modules.
        cd "$RUNNER_TEMP"
        python -c "import cli, scanners, vulnerability_database, mcp_server; print('flat imports OK')"

    - name: Run test suite
      run: pytest tests/ -v

    - name: Lint with flake8 (non-blocking)
      continue-on-error: true
      run: |
        flake8 src --count --max-complexity=10 --max-line-length=88 --statistics

    - name: Check formatting with Black (non-blocking)
      continue-on-error: true
      run: black --check --diff src

  smoke-scan:
    name: Smoke - scanner runs on sample data
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Scanner and remediation import smoke
      shell: bash
      run: |
        python -c "import sys; sys.path.insert(0, 'src'); from scanner import CVEScanner; CVEScanner(); print('Scanner module OK')"
        python -c "import sys; sys.path.insert(0, 'src'); from remediation import Remediator; Remediator(); print('Remediation module OK')"

    - name: Run scanner on a generated vulnerable project
      shell: bash
      run: |
        mkdir -p test_project
        python -c "import json; open('test_project/package.json', 'w').write(json.dumps({'name': 'test-project', 'version': '1.0.0', 'dependencies': {'next': '14.1.5'}}, indent=2))"
        python src/scan_simple.py test_project

  security-scan:
    name: Security Scanning (Bandit)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run Bandit from pip
      # Run bandit directly from PyPI instead of depending on a third-party
      # action via a mutable tag. -ll reports MEDIUM+ severity; non-blocking.
      continue-on-error: true
      run: |
        python -m pip install --upgrade pip bandit
        bandit -r src -ll -f json -o bandit-report.json || true
        bandit -r src -ll || true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json
        if-no-files-found: ignore
